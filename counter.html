<style>
  .overflow { color: red; }
  .negative { color: blue; }
</style>
<div>
  <h1 id="ttl">Counter</h1>
  <p id="d" style="font-size:40px;font-family:arial">0</p>
  <button onclick="doOperation(ACTION.INCREMENT)" style="padding:10px;background:green;color:white">+</button>
  <button onclick="doOperation(ACTION.DECREMENT)" style="padding:10px;background:red;color:white">-</button>
  <button onclick="doOperation(ACTION.RESET)" style="padding:10px;background:gray;color:white">reset</button>
  <button onclick="doOperation(ACTION.ADD_FOUR)">+5</button>
  <button onclick="doOperation(ACTION.DOUBLE)">x2</button>
</div>

<script>
// Relies on this staying a classic (non-module) inline script: onclick
// attributes need ACTION to be reachable from global scope.
const ACTION = Object.freeze({ INCREMENT: 1, DECREMENT: 2, RESET: 3, ADD_FOUR: 4, DOUBLE: 5 });
var c = 0
var cc = 0 // cc counts every dispatched action, shown as clicks in the title
var temp

function doOperation(x){
  // main logic
  switch(x){
    case ACTION.INCREMENT:
      console.log("doStuff: ACTION.INCREMENT")
      c = c + 1
      break;
    case ACTION.DECREMENT:
      console.log("doStuff: ACTION.DECREMENT")
      c = c - 1
      break;
    case ACTION.RESET:
      console.log("doStuff: ACTION.RESET")
      c = 0
      break;
    case ACTION.ADD_FOUR:
      console.log("doStuff: ACTION.ADD_FOUR")
      temp = c
      temp = temp + 4
      c = temp
      break;
    case ACTION.DOUBLE:
      console.log("doStuff: ACTION.DOUBLE")
      c = c * 2
      break;
    default:
      console.warn("doStuff: unrecognized action", x)
      return;
  }

  cc++
  console.log("doStuff: cc incremented to", cc)
  render()
}

function render(){
  document.getElementById("d").innerHTML = c
  document.getElementById("d").classList.toggle('overflow', c > 10)
  document.getElementById("d").classList.toggle('negative', c < 0)

  // update title
  document.getElementById("ttl").innerHTML = "Counter (" + cc + " clicks)"
}
</script>
