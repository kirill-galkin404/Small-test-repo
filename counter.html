<div>
  <h1 id="ttl">Counter</h1>
  <p id="d" style="font-size:40px;color:black;font-family:arial">0</p>
  <button onclick="increment()" style="padding:10px;background:green;color:white">+</button>
  <button onclick="decrement()" style="padding:10px;background:red;color:white">-</button>
  <button onclick="reset()" style="padding:10px;background:gray;color:white">reset</button>
  <button onclick="addFive()">+5</button>
  <button onclick="double()">x2</button>
</div>

<script>
let c = 0
let cc = 0

function updateDisplay(){
  document.getElementById("d").innerHTML = c
  if(c > 10){
    document.getElementById("d").style.color = "red"
  } else if(c < 0){
    document.getElementById("d").style.color = "blue"
  } else {
    document.getElementById("d").style.color = "black"
  }
  document.getElementById("ttl").innerHTML = "Counter (" + cc + " clicks)"
}

function increment(){
  c += 1
  cc++
  updateDisplay()
}

function decrement(){
  c -= 1
  cc++
  updateDisplay()
}

function reset(){
  c = 0
  cc = 0
  updateDisplay()
}

function addFive(){
  c += 5
  cc++
  updateDisplay()
}

function double(){
  c *= 2
  cc++
  updateDisplay()
}
</script>
