<div>
  <h1 id="ttl">Counter</h1>
  <p id="d" style="font-size:40px;color:black;font-family:arial">0</p>
  <button onclick="doStuff(ACTION.INCREMENT)" style="padding:10px;background:green;color:white">+</button>
  <button onclick="doStuff(ACTION.DECREMENT)" style="padding:10px;background:red;color:white">-</button>
  <button onclick="doStuff(ACTION.RESET)" style="padding:10px;background:gray;color:white">reset</button>
  <button onclick="doStuff(ACTION.ADD_FIVE)">+5</button>
  <button onclick="doStuff(ACTION.DOUBLE)">x2</button>
</div>

<script>
// Relies on this staying a classic (non-module) inline script: onclick
// attributes need ACTION to be reachable from global scope.
const ACTION = Object.freeze({ INCREMENT: 1, DECREMENT: 2, RESET: 3, ADD_FIVE: 4, DOUBLE: 5 });
var c = 0
var cc = 0 // total clicks maybe??

function doStuff(x){
  // main logic
  switch(x){
    case ACTION.INCREMENT:
      c = c + 1
      cc++
      break
    case ACTION.DECREMENT:
      c = c - 1
      cc++
      break
    case ACTION.RESET:
      c = 0
      break
    case ACTION.ADD_FIVE:
      c += 5
      cc++
      break
    case ACTION.DOUBLE:
      // Decision: DOUBLE counts as a click like every other action except
      // RESET, so it increments cc too.
      c = c * 2
      cc++
      break
  }

  // shared post-action render: #d text/color and #ttl are always kept in
  // sync here, regardless of which action ran above. Deliberate decision:
  // the color rule (red >10 / blue <0 / else black) is now derived purely
  // from the current value of c, applied uniformly to every action. Before
  // this refactor, only DECREMENT ever produced blue (INCREMENT/ADD_FIVE/
  // RESET/DOUBLE never checked c<0); e.g. an INCREMENT that leaves c
  // negative now renders blue where it used to stay black. This is an
  // intended consequence of unifying the render logic, not an oversight.
  document.getElementById("d").innerHTML = c
  if(c > 10){
    document.getElementById("d").style.color = "red"
  } else if(c < 0){
    document.getElementById("d").style.color = "blue"
  } else {
    document.getElementById("d").style.color = "black"
  }
  document.getElementById("ttl").innerHTML = "Counter (" + cc + " clicks)"
}
</script>
